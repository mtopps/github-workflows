name: Terraform Plan and Apply Workflow

on:
  workflow_call:
    inputs:
      GCP_BUCKET_PREFIX:
        required: true
        type: string
      GCP_BUCKET:
        required: true
        type: string
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER_NAME:
        required: false
      GCP_WORKLOAD_IDENTITY_SA_EMAIL:
        required: false
      TOKEN:
        required: false
      OWNER:
        required: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Set Environment Variables
        run: |
          if [ -n "${{ secrets.TOKEN }}" ]; then echo "TF_VAR_token=${{ secrets.TOKEN }}" >> $GITHUB_ENV; fi
          if [ -n "${{ secrets.OWNER }}" ]; then echo "TF_VAR_owner=${{ secrets.OWNER }}" >> $GITHUB_ENV; fi
          if [ -n "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_NAME }}" ]; then echo "TF_VAR_GCP_WORKLOAD_IDENTITY_PROVIDER_NAME=${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_NAME }}" >> $GITHUB_ENV; fi
          if [ -n "${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}" ]; then echo "TF_VAR_GCP_WORKLOAD_IDENTITY_SA_EMAIL=${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}" >> $GITHUB_ENV; fi

      - uses: actions/checkout@v4.1.7

      - name: Cache Terraform providers
        uses: actions/cache@v3
        with:
          path: |
            **/.terraform
            **/terraform-provider-*
            **/modules/*
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/*.tf') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2.1.5'
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_NAME }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: Verify Authentication
        run: |
          echo "Verifying authentication..."
          ORG_ID=$(gcloud organizations list --format='value(ID)' --quiet)
          if [ -z "$ORG_ID" ]; then
            echo "No organization ID found. Authentication failed."
            exit 1
          else
            echo "Authenticated successfully. Organization ID: $ORG_ID"
          fi

      - uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: 1.9.5

      - id: init
        name: Terraform Init
        run: terraform init -lockfile=readonly -input=false -backend-config="prefix=${{ inputs.GCP_BUCKET_PREFIX }}" -backend-config="bucket=${{ inputs.GCP_BUCKET }}"

      - id: validate
        name: Terraform Validate
        run: terraform validate -no-color

      - id: plan
        name: Terraform Plan
        run: |
          echo "Running Terraform Plan with detailed logging..."
          terraform plan -no-color -out=tfplan -input=false -detailed-exitcode 2>&1 | tee terraform_plan.log
          awk '/Terraform will perform the following actions:/,0' terraform_plan.log | sed '/Terraform used the selected providers to generate the following execution plan./,$d' > filtered_plan.log
        continue-on-error: true

      - name: Upload Plan
        uses: actions/upload-artifact@v4.4.0
        with:
          name: tfplan
          path: tfplan

      - name: Publish Terraform Plan as Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('filtered_plan.log', 'utf8');
            const output = `#### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖

            <details><summary>Show Plan</summary>
            
            \`\`\`\n${plan}\n\`\`\`
            
            </details>
            
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });


  tfsec-checks:
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - name: Check out Git Repository
        uses: actions/checkout@v4.1.7

      - name: Run tfsec-checks workflow
        uses: './.github/workflows/tfsec-checks.yml@main'


  on-failure:
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Upload Failed Workflow Log
        uses: actions/upload-artifact@v4.4.0
        with:
          name: failed-workflow-log
          path: ${{ github.workspace }}/workflow.log

      - name: Publish Failed Workflow Log as Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('${{ github.workspace }}/workflow.log', 'utf8');
            const output = `#### Workflow Failed 🚨
            
            <details><summary>Show Log</summary>
            
            \`\`\`\n${log}\n\`\`\`
            
            </details>
            
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });