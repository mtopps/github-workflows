name: Checkov Scan

on:
  workflow_run:
    workflows: ["Terraform Plan - GCP"]
    types:
      - completed

permissions:
  contents: read
  pull-requests: write
  id-token: write
  security-events: write
  actions: read

jobs:
  setup:
    runs-on: self-hosted
    needs: [plan]
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4.1.7

  cache-checkov:
    runs-on: self-hosted
    steps:
      - name: Cache External Modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/checkov
            ~/.checkov
          key: ${{ runner.os }}-checkov-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-checkov-

  checkov:
    runs-on: self-hosted
    needs: [setup, cache-checkov]
    steps:
      - name: Checkov GitHub Action
        uses: bridgecrewio/checkov-action@v12
        with:
          output_format: cli,github_failed_only
          output_file_path: console
          download_external_modules: true
          soft_fail: true

      - name: Upload Checkov Results
        uses: actions/upload-artifact@v4.4.0
        with:
          name: checkov-results
          path: results.sarif

      - name: Publish Checkov Results as Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('results.sarif', 'utf8');
            const output = `#### Checkov Scan Results 📊

            <details><summary>Show Results</summary>
            
            \`\`\`\n${results}\n\`\`\`
            
            </details>
            
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
